name: Build and Push Docker Images

on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Build Image
        run: docker build -t rahulpopuri/rahul-app:latest .

      - name: Push Docker Image
        run: docker push rahulpopuri/rahul-app:latest
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            whoami
            hostname
            docker pull rahulpopuri/rahul-app:latest

            docker stop rahul-app || true

            docker rm rahul-app || true

            docker run -d\
              --name rahul-app \
              -p 80:80 \
              rahulpopuri/rahul-app:latest
